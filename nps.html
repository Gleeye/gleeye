<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Il tuo feedback — Gleeye</title>
    <link rel="icon" type="image/png" href="logo_gleeye_new.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous"></script>
    <style>
        :root {
            --bg: #f5f6fa;
            --card: #fff;
            --text: #1f2937;
            --text-soft: #6b7280;
            --border: #e5e7eb;
            --accent: #1f2937;
            --accent-soft: #f3f4f6;
            --good: #10b981;
            --warn: #f59e0b;
            --bad: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            line-height: 1.5;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
            max-width: 560px;
            width: 100%;
            padding: 2.5rem 2rem;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: .65rem;
            margin-bottom: 1.5rem;
            color: var(--text-soft);
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .08em;
            font-weight: 600;
        }
        .brand img { height: 24px; width: auto; }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 .5rem;
            line-height: 1.3;
        }
        .lead {
            color: var(--text-soft);
            margin: 0 0 1.75rem;
            font-size: .95rem;
        }
        .scale {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: .35rem;
            margin: 1.5rem 0 .5rem;
        }
        .scale button {
            aspect-ratio: 1;
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: 10px;
            font-weight: 600;
            font-size: .95rem;
            color: var(--text);
            cursor: pointer;
            transition: transform .12s, background .15s, border-color .15s;
        }
        .scale button:hover { transform: translateY(-2px); border-color: var(--accent); }
        .scale button.selected {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .scale-labels {
            display: flex;
            justify-content: space-between;
            font-size: .72rem;
            color: var(--text-soft);
            margin-bottom: 1.5rem;
            padding: 0 .15rem;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: .85rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: .95rem;
            resize: vertical;
        }
        textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
        label { display: block; margin: 1rem 0 .4rem; font-size: .85rem; font-weight: 500; color: var(--text); }
        button.submit {
            margin-top: 1.5rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: .95rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background .15s;
        }
        button.submit:hover { background: #111827; }
        button.submit:disabled { background: #9ca3af; cursor: not-allowed; }
        .state {
            text-align: center;
            padding: 1rem 0;
        }
        .state-icon {
            width: 56px; height: 56px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem;
        }
        .state-icon.success { background: #d1fae5; color: var(--good); }
        .state-icon.error { background: #fee2e2; color: var(--bad); }
        .footer-mini {
            margin-top: 2rem;
            text-align: center;
            font-size: .72rem;
            color: var(--text-soft);
        }
        @media (max-width: 480px) {
            .card { padding: 1.75rem 1.25rem; }
            h1 { font-size: 1.25rem; }
            .scale { gap: .2rem; }
            .scale button { font-size: .8rem; }
        }
    </style>
</head>

<body>
    <div class="card" id="root">
        <div class="state">
            <div style="color:var(--text-soft);">Caricamento…</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://whpbetjyhpttinbxcffs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndocGJldGp5aHB0dGluYnhjZmZzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNTQzMjcsImV4cCI6MjA4MjkzMDMyN30.cwGACRAp_aLaXKHrSVcZKHz0tX1zvvHb_xGHNHxJxu8';

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const root = document.getElementById('root');

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        let selectedScore = null;

        function brandHeader() {
            return `<div class="brand"><img src="logo_gleeye_new.png" alt="Gleeye" />Feedback Gleeye</div>`;
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        async function init() {
            if (!token) {
                renderState('error', 'Link non valido', 'Manca il token. Apri il link dall\'email originale.');
                return;
            }

            const { data, error } = await sb.rpc('nps_fetch_by_token', { p_token: token });
            if (error || !data || data.length === 0) {
                renderState('error', 'Link non trovato', 'Il link potrebbe essere stato già usato o non essere più valido.');
                return;
            }

            const survey = data[0];
            if (survey.completed_at) {
                renderState('success', 'Grazie!', 'Hai già inviato il feedback per questa commessa.');
                return;
            }
            if (survey.is_expired) {
                renderState('error', 'Link scaduto', 'Questo link non è più valido. Contatta il tuo referente Gleeye se vuoi inviare comunque un feedback.');
                return;
            }

            renderForm(survey);
        }

        function renderForm(survey) {
            const orderRef = survey.order_number ? `(rif. ${escapeHtml(survey.order_number)})` : '';
            root.innerHTML = `
                ${brandHeader()}
                <h1>Com'è andata, ${escapeHtml(survey.client_name || 'tutto')}?</h1>
                <p class="lead">
                    Abbiamo appena completato i lavori per
                    <strong>${escapeHtml(survey.order_title || 'la tua commessa')}</strong> ${orderRef}.
                    Da 0 a 10, quanto ci raccomanderesti?
                </p>

                <div class="scale" id="scale">
                    ${Array.from({ length: 11 }, (_, i) => `<button data-score="${i}">${i}</button>`).join('')}
                </div>
                <div class="scale-labels">
                    <span>Per niente</span><span>Sicuramente sì</span>
                </div>

                <label for="comment">Vuoi aggiungere qualcosa? (opzionale)</label>
                <textarea id="comment" placeholder="Cosa ha funzionato bene, cosa avremmo potuto fare meglio…"></textarea>

                <button class="submit" id="submit-btn" disabled>Invia feedback</button>

                <div class="footer-mini">Il tuo feedback va direttamente a ${escapeHtml(survey.sender_name || 'Gleeye')}.</div>
            `;

            const scale = document.getElementById('scale');
            const submitBtn = document.getElementById('submit-btn');

            scale.addEventListener('click', e => {
                const btn = e.target.closest('button[data-score]');
                if (!btn) return;
                selectedScore = parseInt(btn.dataset.score, 10);
                scale.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                submitBtn.disabled = false;
            });

            submitBtn.addEventListener('click', async () => {
                if (selectedScore === null) return;
                submitBtn.disabled = true;
                submitBtn.textContent = 'Invio in corso…';

                const comment = document.getElementById('comment').value.trim() || null;
                const { data, error } = await sb.rpc('nps_submit', {
                    p_token: token,
                    p_score: selectedScore,
                    p_comment: comment,
                });

                if (error || !data?.success) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Invia feedback';
                    const reason = data?.error || error?.message || 'Errore sconosciuto';
                    if (reason === 'already_completed') {
                        renderState('success', 'Grazie!', 'Hai già inviato il feedback per questa commessa.');
                    } else if (reason === 'expired') {
                        renderState('error', 'Link scaduto', 'Questo link non è più valido.');
                    } else {
                        renderState('error', 'Errore', 'Non siamo riusciti a salvare il feedback. Riprova più tardi.');
                    }
                    return;
                }

                renderState('success', 'Grazie!',
                    selectedScore >= 9
                        ? 'Ci fa felici. Continueremo a darci dentro.'
                        : selectedScore >= 7
                            ? 'Grazie del feedback, lo prenderemo seriamente in considerazione.'
                            : 'Grazie. Il tuo referente ti contatterà per capire come migliorare.'
                );
            });
        }

        function renderState(kind, title, message) {
            root.innerHTML = `
                ${brandHeader()}
                <div class="state">
                    <div class="state-icon ${kind}">${kind === 'success' ? '✓' : '!'}</div>
                    <h1 style="text-align:center;">${escapeHtml(title)}</h1>
                    <p style="text-align:center;color:var(--text-soft);">${escapeHtml(message)}</p>
                </div>
            `;
        }

        init();
    </script>
</body>

</html>
